name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.14"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint with ruff
        run: uv run ruff check app/ tests/

      - name: Check formatting
        run: uv run ruff format --check app/ tests/

      - name: Run tests with coverage
        run: uv run pytest tests/ --cov=app --cov-report=term-missing --cov-fail-under=60
